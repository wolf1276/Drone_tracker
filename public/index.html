<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Drone Tracking Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.9);
            --text-color: #f8fafc;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        #dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #map {
            flex-grow: 1;
            height: 100%;
            z-index: 1;
        }

        #status-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            z-index: 1000;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 16px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .stat-group {
            margin-bottom: 20px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .stat-unit {
            font-size: 1rem;
            font-weight: 400;
            color: #94a3b8;
        }

        .coords {
            font-family: monospace;
            font-size: 1.1rem;
            margin-top: 8px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .battery-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .battery-fill {
            height: 100%;
            background: var(--success);
            width: 100%;
            transition: width 0.5s ease, background-color 0.5s ease;
        }
        
        #loading-overlay {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }
        
        #loading-overlay h1 {
            color: var(--accent);
            margin-top: 20px;
            font-weight: 800;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        .leaflet-marker-icon {
            transition: transform 0.8s linear;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" stroke="#38bdf8">
            <g fill="none" fill-rule="evenodd" stroke-width="4">
                <circle cx="50" cy="50" r="1">
                    <animate attributeName="r" begin="0s" dur="1.8s" values="1; 40" calcMode="spline" keyTimes="0; 1" keySplines="0.165, 0.84, 0.44, 1" repeatCount="indefinite" />
                    <animate attributeName="stroke-opacity" begin="0s" dur="1.8s" values="1; 0" calcMode="spline" keyTimes="0; 1" keySplines="0.3, 0.61, 0.355, 1" repeatCount="indefinite" />
                </circle>
            </g>
        </svg>
        <h1>AWAITING SIGNAL...</h1>
    </div>

    <div id="dashboard-container">
        <div id="map"></div>
        
        <div id="status-panel">
            <div class="header">
                <h2>Telemetry Info</h2>
                <div class="live-indicator" id="conn-status">
                    <div class="dot" id="conn-dot" style="background-color: var(--danger); box-shadow: 0 0 8px var(--danger);"></div>
                    <span id="conn-text">Disconnected</span>
                </div>
            </div>

            <div class="stat-group">
                <div class="stat-label">Velocity</div>
                <div class="stat-value"><span id="speed-val">--</span> <span class="stat-unit">m/s</span></div>
            </div>

            <div class="stat-group">
                <div class="stat-label">Battery Level</div>
                <div class="stat-value"><span id="battery-val">--</span> <span class="stat-unit">%</span></div>
                <div class="battery-container">
                    <div class="battery-fill" id="battery-fill" style="width: 0%;"></div>
                </div>
            </div>

            <div class="stat-group">
                <div class="stat-label">Coordinates</div>
                <div class="coords">
                    Lat: <span id="lat-val">--.----</span><br>
                    Lon: <span id="lon-val">--.----</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Socket.IO Client -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const map = L.map('map', {
            zoomControl: false
        }).setView([0, 0], 2);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        const droneIconSVG = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#38bdf8" width="40" height="40">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>`;
        const droneIconUrl = 'data:image/svg+xml;base64,' + btoa(droneIconSVG);

        const droneIcon = L.icon({
            iconUrl: droneIconUrl,
            iconSize: [40, 40],
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        let marker = null;
        let isFirstUpdate = true;

        const latVal = document.getElementById('lat-val');
        const lonVal = document.getElementById('lon-val');
        const speedVal = document.getElementById('speed-val');
        const batteryVal = document.getElementById('battery-val');
        const batteryFill = document.getElementById('battery-fill');
        const connText = document.getElementById('conn-text');
        const connDot = document.getElementById('conn-dot');
        const overlay = document.getElementById('loading-overlay');

        function updateUI(data) {
            if (isFirstUpdate) {
                 // Try to locate marker and set map view without completely breaking if it fails
                 try {
                     marker = L.marker([data.latitude, data.longitude], {icon: droneIcon}).addTo(map);
                     map.setView([data.latitude, data.longitude], 16);
                 } catch(e) {
                     console.error("Map initialization issue: ", e);
                 }
                
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
                
                isFirstUpdate = false;
            } else {
                 try {
                     marker.setLatLng([data.latitude, data.longitude]);
                     map.panTo([data.latitude, data.longitude]);
                 } catch(e) {}
            }

            latVal.innerText = data.latitude.toFixed(6);
            lonVal.innerText = data.longitude.toFixed(6);
            speedVal.innerText = data.speed.toFixed(1);
            batteryVal.innerText = data.battery.toFixed(1);

            batteryFill.style.width = data.battery + '%';
            if (data.battery > 50) {
                batteryFill.style.backgroundColor = 'var(--success)';
            } else if (data.battery > 20) {
                batteryFill.style.backgroundColor = 'var(--warning)';
            } else {
                batteryFill.style.backgroundColor = 'var(--danger)';
            }
        }

        const socket = io();

        socket.on('connect', () => {
            connText.innerText = 'Connected';
            connText.style.color = 'var(--success)';
            connDot.style.backgroundColor = 'var(--success)';
            connDot.style.boxShadow = '0 0 8px var(--success)';
        });

        socket.on('disconnect', () => {
             // In browser environment, UI changes only applied when socket is literally disconnected.
            connText.innerText = 'Disconnected';
            connText.style.color = 'var(--danger)';
            connDot.style.backgroundColor = 'var(--danger)';
            connDot.style.boxShadow = '0 0 8px var(--danger)';
        });

        socket.on('location-update', (data) => {
            updateUI(data);
        });
    </script>
</body>
</html>
